<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de"
      th:replace="~{layout :: layout(~{::content})}">
<head>
    <title th:text="${title}">Person</title>
</head>
<body>
<th:block th:fragment="content">

<div class="page-header">
    <h1 th:text="${title}">Person erfassen</h1>
    <a th:href="@{/persons}" class="btn btn-outline">← Zurück zur Liste</a>
</div>

<div class="card form-card">
    <form th:action="${person.id != null ? '/persons/' + person.id + '/edit' : '/persons/new'}"
          th:object="${person}"
          method="post">

        <div class="form-row">
            <!-- First name -->
            <div class="form-group" th:classappend="${#fields.hasErrors('firstName')} ? 'has-error'">
                <label for="firstName">Vorname <span class="required">*</span></label>
                <input type="text"
                       id="firstName"
                       th:field="*{firstName}"
                       class="input"
                       placeholder="z. B. Hans"/>
                <span th:if="${#fields.hasErrors('firstName')}"
                      th:errors="*{firstName}"
                      class="error-msg"></span>
            </div>

            <!-- Last name -->
            <div class="form-group" th:classappend="${#fields.hasErrors('lastName')} ? 'has-error'">
                <label for="lastName">Nachname <span class="required">*</span></label>
                <input type="text"
                       id="lastName"
                       th:field="*{lastName}"
                       class="input"
                       placeholder="z. B. Muster"/>
                <span th:if="${#fields.hasErrors('lastName')}"
                      th:errors="*{lastName}"
                      class="error-msg"></span>
            </div>
        </div>

        <!-- Email -->
        <div class="form-group" th:classappend="${#fields.hasErrors('email')} ? 'has-error'">
            <label for="email">E-Mail <span class="required">*</span></label>
            <input type="email"
                   id="email"
                   th:field="*{email}"
                   class="input"
                   placeholder="hans.muster@example.ch"/>
            <span th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"
                  class="error-msg"></span>
        </div>

        <!-- Birth date -->
        <div class="form-group" th:classappend="${#fields.hasErrors('birthDate')} ? 'has-error'">
            <label for="birthDate">Geburtsdatum <span class="required">*</span></label>
            <input type="date"
                   id="birthDate"
                   th:field="*{birthDate}"
                   class="input"/>
            <span th:if="${#fields.hasErrors('birthDate')}"
                  th:errors="*{birthDate}"
                  class="error-msg"></span>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <span th:text="${person.id != null ? '💾 Speichern' : '➕ Erstellen'}">Speichern</span>
            </button>
            <a th:href="@{/persons}" class="btn btn-outline">Abbrechen</a>
        </div>

    </form>
</div>

</th:block>
</body>
</html>
