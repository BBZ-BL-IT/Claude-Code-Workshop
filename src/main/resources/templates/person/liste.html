<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de"
      th:replace="~{layout :: layout(~{::content})}">
<head>
    <title>Personenliste</title>
</head>
<body>
<th:block th:fragment="content">

<div class="page-header">
    <h1>Personen</h1>
    <a th:href="@{/personen/neu}" class="btn btn-primary">+ Neue Person</a>
</div>

<!-- Suchformular -->
<div class="card">
    <form th:action="@{/personen}" method="get" class="search-form">
        <input type="text"
               name="suche"
               th:value="${suche}"
               placeholder="Suche nach Name oder E-Mail…"
               class="input"/>
        <button type="submit" class="btn btn-secondary">🔍 Suchen</button>
        <a th:if="${suche != null and !#strings.isEmpty(suche)}"
           th:href="@{/personen}" class="btn btn-outline">✕ Zurücksetzen</a>
    </form>
</div>

<!-- Ergebniszahl -->
<p class="result-count">
    <span th:text="${personen.size()}">0</span> Person(en) gefunden
    <span th:if="${suche != null and !#strings.isEmpty(suche)}">
        für „<strong th:text="${suche}"></strong>"
    </span>
</p>

<!-- Tabelle -->
<div class="card table-card">
    <table th:if="${!personen.isEmpty()}">
        <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>E-Mail</th>
            <th>Geburtsdatum</th>
            <th>Adresse</th>
            <th>Aktionen</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="person : ${personen}">
            <td th:text="${person.id}">1</td>
            <td>
                <a th:href="@{/personen/{id}(id=${person.id})}"
                   th:text="${person.vorname + ' ' + person.nachname}">Max Muster</a>
            </td>
            <td th:text="${person.email}">mail@example.ch</td>
            <td th:text="${#temporals.format(person.geburtsdatum, 'dd.MM.yyyy')}">01.01.1990</td>
            <td th:text="${person.adresse != null ? person.adresse : '–'}">Strasse 1</td>
            <td class="actions">
                <a th:href="@{/personen/{id}(id=${person.id})}" class="btn btn-sm btn-outline">👁 Detail</a>
                <a th:href="@{/personen/{id}/bearbeiten(id=${person.id})}" class="btn btn-sm btn-secondary">✏️ Bearbeiten</a>
                <form th:action="@{/personen/{id}/loeschen(id=${person.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Person wirklich löschen?')">
                    <button type="submit" class="btn btn-sm btn-danger">🗑 Löschen</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${personen.isEmpty()}" class="empty-state">
        <p>Keine Personen gefunden.</p>
        <a th:href="@{/personen/neu}" class="btn btn-primary">Erste Person erfassen</a>
    </div>
</div>

</th:block>
</body>
</html>
