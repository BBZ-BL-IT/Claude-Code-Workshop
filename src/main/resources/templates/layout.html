<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' – Personenverwaltung' : 'Personenverwaltung'}">Personenverwaltung</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header>
    <nav>
        <a th:href="@{/persons}" class="nav-brand">👤 Personenverwaltung</a>
    </nav>
</header>

<main>
    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- Page content -->
    <th:block th:replace="${content}"/>
</main>

<footer>
    <p>Spring Boot + Thymeleaf CRUD Beispiel</p>
</footer>

</body>
</html>
